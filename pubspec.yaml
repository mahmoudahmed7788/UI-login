name: login_page
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/image.png

  fonts:
    - family: WorkSans
      fonts:
        - asset: assets/fonts/static/WorkSans-Regular.ttf
        - asset: assets/fonts/static/WorkSans-Bold.ttf
        - asset: assets/fonts/static/WorkSans-ExtraBold.ttf

